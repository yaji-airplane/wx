<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天気図表示</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0px;
        }
        button {
            margin: 3px;
            padding: 5px 10px;
            font-size: 16px;
        }
        img {
            max-width: 95%;
            height: auto;
            margin-top: 5px;
        }
        #debug {
            margin-top: 5px;
            font-size: 14px;
            white-space: pre-line;
        }
    </style>

    <script>

        /* ▼▼▼ 履歴管理 ▼▼▼ */
        let historyIndex = 0;
        const maxHistory = 4;
        let currentType = null;

        /* ▼ UTC 取得 ▼ */
        function getUTCDateFromLocal(offsetHours = 0) {
            const now = new Date();
            now.setUTCHours(now.getUTCHours() - offsetHours);

            const utcYear = now.getUTCFullYear();
            const utcMonth = ('0' + (now.getUTCMonth() + 1)).slice(-2);
            const utcDay = ('0' + now.getUTCDate()).slice(-2);

            return {
                date: now,
                formatted: `${utcYear}${utcMonth}${utcDay}`,
                prevFormatted: getPreviousFormattedDate(utcYear, utcMonth, utcDay)
            };
        }

        function getPreviousFormattedDate(year, month, day) {
            const date = new Date(Date.UTC(year, month - 1, day));
            date.setUTCDate(date.getUTCDate() - 1);
            const prevYear = date.getUTCFullYear();
            const prevMonth = ('0' + (date.getUTCMonth() + 1)).slice(-2);
            const prevDay = ('0' + date.getUTCDate()).slice(-2);
            return `${prevYear}${prevMonth}${prevDay}`;
        }

        /* ▼ URL 生成 ▼ */
        function getURL(type, utc) {
            const utcHours = utc.date.getUTCHours();
            const utcMinutes = utc.date.getUTCMinutes();
            const base = `https://www3.metair.go.jp/pict/${type}/`;
            let url = '';

            switch(type) {
                case 'ASAS':
                    if (utcHours > 20 || (utcHours === 20 && utcMinutes >= 40)) url = `${base}QACA98_RJTD_${utc.formatted}180000.png`;
                    else if (utcHours > 14 || (utcHours === 14 && utcMinutes >= 40)) url = `${base}QACA98_RJTD_${utc.formatted}120000.png`;
                    else if (utcHours > 8 || (utcHours === 8 && utcMinutes >= 40)) url = `${base}QACA98_RJTD_${utc.formatted}060000.png`;
                    else if (utcHours > 2 || (utcHours === 2 && utcMinutes >= 40)) url = `${base}QACA98_RJTD_${utc.formatted}000000.png`;
                    else url = `${base}QACA98_RJTD_${utc.prevFormatted}180000.png`;
                    break;

                case 'FSAS24':
                    if (utcHours > 17 || (utcHours === 17 && utcMinutes >= 35)) url = `${base}QACE98_RJTD_${utc.formatted}120000.png`;
                    else if (utcHours > 4 || (utcHours === 4 && utcMinutes >= 35)) url = `${base}QACE98_RJTD_${utc.formatted}000000.png`;
                    else url = `${base}QACE98_RJTD_${utc.prevFormatted}120000.png`;
                    break;
            }
            return url;
        }

        /* ▼ 画像の Last-Modified を取得 ▼ */
        async function fetchImageTimestamp(url) {
            try {
                const response = await fetch(url, { method: "HEAD" });

                return {
                    lastModified: response.headers.get("Last-Modified"),
                    serverDate: response.headers.get("Date")
                };
            } catch (e) {
                return null;
            }
        }

        /* ▼ 画像表示（履歴対応） ▼ */
        function showImage(type) {
            currentType = type;
            historyIndex = 0;
            updateImage();
        }

        async function updateImage() {
            if (!currentType) return;

            const offsetHours = (currentType === 'FSAS24')
                ? historyIndex * 12
                : historyIndex * 6;

            const utc = getUTCDateFromLocal(offsetHours);
            const url = getURL(currentType, utc);

            document.getElementById('weather-image').src = url;

            let debugText =
                `履歴: ${historyIndex}\nUTC: ${utc.date.toISOString()}\nURL: ${url}`;

            /* ▼ Last-Modified を取得して debug に追加 ▼ */
            const info = await fetchImageTimestamp(url);
if (info && info.lastModified) {
    debugText += `\nLast-Modified: ${info.lastModified}`;
} else {
    debugText += `\nLast-Modified: N/A`;
}


            document.getElementById('debug').innerText = debugText;
        }

        /* ▼ ナビゲーション ▼ */
        function goLatest() {
            historyIndex = 0;
            updateImage();
        }

        function goPrev() {
            if (historyIndex < maxHistory) {
                historyIndex++;
                updateImage();
            }
        }

        function goNext() {
            if (historyIndex > 0) {
                historyIndex--;
                updateImage();
            }
        }

    </script>
</head>

<body>

    <div class="button-container">
        <button onclick="showImage('ASAS')">ASAS</button>
        <button onclick="showImage('FSAS24')">FSAS24</button>
    </div>

    <div class="button-container">
        <button onclick="goPrev()">←</button>
        <button onclick="goLatest()">最新</button>
        <button onclick="goNext()">→</button>
    </div>

    <img id="weather-image" alt="天気図がここに表示されます">
    <div id="debug"></div>

</body>
</html>
